name: ssh_app
description: Smart Safety Helmet - Flutter Application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.3
  firebase_core: ^3.3.0

  flutter:
    sdk: flutter

  flutter_blue_plus: ^1.32.4

  # Localization
  flutter_localizations:
    sdk: flutter

  go_router: ^15.1.2
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.1.1
  google_maps_flutter: ^2.10.1
  google_maps_flutter_web: ^0.5.10

  permission_handler: ^11.3.1
  provider: ^6.1.5+1
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/